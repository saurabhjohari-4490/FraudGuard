services:
  test-runner:
    build:
      context: .
    command: pytest --cov=fraud_detection --cov-report=html --cov-report=term -v
    environment:
      - DATABASE_URL=postgresql+asyncpg://fraud:fraud_secret@test-postgres:5432/fraud_test
      - REDIS_URL=redis://test-redis:6379/1
      - APP_ENV=testing
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    volumes:
      - ./tests:/app/tests
      - ./src:/app/src

  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraud_test
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud_secret
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 3s
      timeout: 2s
      retries: 5

  test-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
